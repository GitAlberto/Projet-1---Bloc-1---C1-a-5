# =============================================================================
# Docker Compose - ArnaqueRadar
# PostgreSQL est gere localement via pgAdmin4 (ne pas le demarrer ici).
# Apache Hive est demarre via Docker pour la source Big Data.
# `IS_RESUME=true` evite de relancer `schematool -initSchema` a chaque restart.
# Hue fait partie du demarrage standard pour simplifier `up` / `down`.
# =============================================================================

services:
  metastore:
    image: apache/hive:4.0.0
    restart: unless-stopped
    user: "0:0"
    entrypoint: ["/bin/sh", "/opt/hive/scripts/metastore-entrypoint.sh"]
    environment:
      SERVICE_NAME: metastore
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9083'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - hive-metastore-db:/opt/hive/metastore_volume
      - hive-warehouse:/opt/hive/data/warehouse
      - ./docker/hive/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hive/core-site.xml:/opt/hive/conf/core-site.xml:ro
      - ./docker/hive/metastore-entrypoint.sh:/opt/hive/scripts/metastore-entrypoint.sh:ro

  hive:
    image: apache/hive:4.0.0
    restart: unless-stopped
    depends_on:
      metastore:
        condition: service_healthy
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      HIVE_METASTORE_HOST: metastore
      HIVE_METASTORE_PORT: "9083"
      SERVICE_OPTS: >-
        -Dhive.server2.authentication=NOSASL
        -Dhive.server2.enable.doAs=false
        -Dhive.server2.thrift.bind.host=0.0.0.0
        -Dhive.server2.thrift.port=10000
        -Dhive.server2.webui.host=0.0.0.0
        -Dhive.server2.webui.port=10002
        -Dhive.metastore.uris=thrift://metastore:9083
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/10000'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - hive-warehouse:/opt/hive/data/warehouse
      - ./docker/hive/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hive/core-site.xml:/opt/hive/conf/core-site.xml:ro

  hue:
    image: gethue/hue:latest
    restart: unless-stopped
    user: "0:0"
    entrypoint: ["/bin/sh", "/usr/share/hue/desktop/conf/entrypoint.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      metastore:
        condition: service_healthy
      hive:
        condition: service_healthy
    environment:
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT}
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      HUE_DB_ENGINE: ${HUE_DB_ENGINE:-postgresql_psycopg2}
      HUE_DB_HOST: ${HUE_DB_HOST:-host.docker.internal}
      HUE_DB_PORT: ${HUE_DB_PORT:-}
      HUE_DB_NAME: ${HUE_DB_NAME:-}
      HUE_DB_USER: ${HUE_DB_USER:-}
      HUE_DB_PASSWORD: ${HUE_DB_PASSWORD:-}
    ports:
      - "8888:8888"
    volumes:
      - ./docker/hue/entrypoint.sh:/usr/share/hue/desktop/conf/entrypoint.sh:ro
      - hue-data:/usr/share/hue/desktop/data

volumes:
  hive-metastore-db:
  hive-warehouse:
  hue-data:

# Les volumes conservent le metastore Derby et les donnees Hive entre les executions.
# La stack complete se pilote avec `docker-compose up -d` / `docker-compose down`.
