# =============================================================================
# Docker Compose - ArnaqueRadar
# PostgreSQL est gere localement via pgAdmin4 (ne pas le demarrer ici).
# Apache Hive est demarre via Docker pour la source Big Data.
# `IS_RESUME=true` evite de relancer `schematool -initSchema` a chaque restart,
# ce qui bloque sinon sur Derby avec "FUNCTION 'NUCLEUS_ASCII' already exists".
# La table logs_arnaques est ensuite chargee avec des donnees reelles PhishStats.
# =============================================================================

services:
  metastore:
    image: apache/hive:4.0.0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/opt/hive/scripts/metastore-entrypoint.sh"]
    environment:
      SERVICE_NAME: metastore
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9083'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - hive-warehouse:/opt/hive/data/warehouse
      - ./docker/hive/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hive/core-site.xml:/opt/hive/conf/core-site.xml:ro
      - ./docker/hive/metastore-entrypoint.sh:/opt/hive/scripts/metastore-entrypoint.sh:ro

  hive:
    image: apache/hive:4.0.0
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/opt/hive/scripts/hiveserver2-entrypoint.sh"]
    depends_on:
      metastore:
        condition: service_healthy
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      HIVE_METASTORE_HOST: metastore
      HIVE_METASTORE_PORT: "9083"
      SERVICE_OPTS: >-
        -Dhive.server2.authentication=NOSASL
        -Dhive.server2.enable.doAs=false
        -Dhive.server2.thrift.bind.host=0.0.0.0
        -Dhive.server2.thrift.port=10000
        -Dhive.server2.webui.host=0.0.0.0
        -Dhive.server2.webui.port=10002
        -Dhive.metastore.uris=thrift://metastore:9083
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/10000'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - hive-warehouse:/opt/hive/data/warehouse
      - ./docker/hive/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hive/core-site.xml:/opt/hive/conf/core-site.xml:ro
      - ./docker/hive/hiveserver2-entrypoint.sh:/opt/hive/scripts/hiveserver2-entrypoint.sh:ro

  hue-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: hue
      POSTGRES_USER: hue
      POSTGRES_PASSWORD: hue
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hue -d hue"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - hue-db-data:/var/lib/postgresql/data

  hue:
    image: gethue/hue:latest
    restart: unless-stopped
    depends_on:
      hive:
        condition: service_started
      hue-db:
        condition: service_healthy
    ports:
      - "8888:8888"
    volumes:
      - ./docker/hue/hue.ini:/usr/share/hue/desktop/conf/z-hue.ini:ro

volumes:
  hive-warehouse:
  hue-db-data:

# Le volume conserve les donnees Hive entre les executions.
